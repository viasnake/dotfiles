name: test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise and bats
        uses: jdx/mise-action@v4
        with:
          install_args: bats

      - name: Run tests
        run: make test
